apiVersion: 1

# Re-provision cleanly on restart so edits to this file always win.
deleteDatasources:
  - name: InfluxDB
    orgId: 1

datasources:
  - name: InfluxDB
    uid: influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      # InfluxDB 2.x uses Flux. The datasource authenticates with a token and
      # needs the org plus a default bucket to scope queries.
      version: Flux
      organization: rhobot
      defaultBucket: raw_bucket
    secureJsonData:
      # Enforced now that InfluxDB v2 runs with auth on; matches INFLUX_TOKEN.
      token: ${INFLUX_TOKEN}
    editable: true
