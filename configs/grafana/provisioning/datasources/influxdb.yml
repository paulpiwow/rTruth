apiVersion: 1

# Re-provision cleanly on restart so edits to this file always win.
deleteDatasources:
  - name: InfluxDB
    orgId: 1

datasources:
  - name: InfluxDB
    uid: influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8181
    isDefault: true
    jsonData:
      # InfluxDB 3 uses SQL (not Flux). "dbName" is the v3 database to query.
      # The SQL datasource talks FlightSQL/gRPC; influx runs plaintext locally,
      # so insecureGrpc must be true (no TLS).
      version: SQL
      dbName: raw_bucket
      insecureGrpc: true
    secureJsonData:
      # Ignored while InfluxDB runs with --without-auth; kept for when auth is on.
      token: ${INFLUX_TOKEN}
    editable: true
