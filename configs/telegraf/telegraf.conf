# Telegraf: subscribe to the testharness MQTT topics, shape the JSON into
# line protocol, and write it to InfluxDB. This is the one config with real
# decisions in it — which fields are tags vs. fields, and where data lands.

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["rhobot/testharness/testcase/+/+/+/+/+"]
  data_format = "json"
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  # Tags = the JSON metadata fields the testharness actually sends (no "source").
  # tagName is a TAG, not a field: it's what makes each sensor a distinct series.
  # As a field, all sensors sharing site/line/asset/type at one timestamp collapse
  # to a single series+time and InfluxDB 3 rejects the batch (400). The only field
  # is the numeric `value`.
  tag_keys = [
  "testcaseNumber",
  "siteName", "lineName", "assetName",
  "measurementType", "tagName", "unit", "status"
  ]
  name_override = "raw_measurement"

# InfluxDB 3 speaks the v2 write API. "bucket" maps to a v3 database and is
# auto-created on first write. The token is ignored while InfluxDB runs with
# --without-auth (see docker-compose.yml), but kept here for when auth is on.
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8181"]
  token = "${INFLUX_TOKEN}"
  organization = "rhobot"
  bucket = "raw_bucket"
