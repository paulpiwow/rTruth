# Telegraf: subscribe to the testharness MQTT topics, shape the JSON into
# line protocol, and write it to InfluxDB. This is the one config with real
# decisions in it — which fields are tags vs. fields, and where data lands.

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics  = ["rhobot/testcase/+/+/+/+"]
  data_format = "json"
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  tag_keys = [
    "source", "testId",
    "siteId", "lineId", "assetId",
    "tagName", "measurementType", "unit"
  ]
  json_string_fields = ["quality"]
  name_override = "raw_measurement"

# InfluxDB 2.x native write API. The token is enforced (the stack runs v2 with
# auth on) and matches DOCKER_INFLUXDB_INIT_ADMIN_TOKEN in docker-compose.yml.
# The org and bucket are created by v2's setup step on first boot.
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "rhobot"
  bucket = "raw_bucket"
