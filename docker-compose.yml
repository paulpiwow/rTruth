services:

  mosquitto:
    image: eclipse-mosquitto:latest
    ports: ["1883:1883"]
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
    networks: [rtruth-net]

  influxdb:
    image: influxdb:3-core
    ports: ["8086:8086"]
    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: rhobot
      INFLUXDB3_OBJECT_STORE:           file
      INFLUXDB3_DB_DIR:                 /var/lib/influxdb3
      INFLUXDB3_ADMIN_TOKEN:            ${INFLUX_TOKEN}
      INFLUXDB3_BUCKETS:                TestHarness_Bucket,Skid_Bucket
    volumes: [influx-data:/var/lib/influxdb3]
    networks: [rtruth-net, rhobot-shared]

  telegraf:
    image: telegraf:latest
    depends_on: [mosquitto, influxdb]
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    networks: [rtruth-net]

  grafana:
    image: grafana/grafana:latest
    depends_on: [influxdb]
    ports: ["3000:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks: [rtruth-net]

volumes:
  influx-data:
  mosquitto-data:
  grafana-data:

networks:
  rtruth-net:
  rhobot-shared:
    external: true     # joins existing testharness + rhobot stacks