# rTruth local telemetry stack:  MQTT -> Telegraf -> InfluxDB 3 -> Grafana.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#
# See README.md for ports, credentials and how data flows.

services:

  mosquitto:
    image: eclipse-mosquitto:2.0.22
    # The single MQTT broker for the whole pipeline. The testharness publishes
    # here and Telegraf subscribes here. Fixed container_name so cross-stack
    # clients on rhobot-shared can address it predictably (rtruth-mosquitto:1883).
    container_name: rtruth-mosquitto
    # Bind to 127.0.0.1 (IPv4) only. Docker Desktop on Windows advertises an
    # IPv6 loopback binding ([::]) but resets connections through it, and the
    # browser resolves `localhost` to ::1 first — so `localhost:<port>` fails
    # with ERR_CONNECTION_RESET. Pinning to 127.0.0.1 makes `localhost` work.
    ports: ["127.0.0.1:${MQTT_PORT:-1883}:1883"]
    volumes:
      - ./configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks:
      rtruth-net:
      rhobot-shared:                  # external net shared with the rhobot + testharness stacks
        aliases: [rtruth-mosquitto]   # the testharness app publishes to tcp://rtruth-mosquitto:1883

  influxdb:
    image: influxdb:3.10.0-core
    # --without-auth: local dev only, no token required. Databases are
    # auto-created on first write (Telegraf creates `raw_bucket`).
    command: [influxdb3, serve, --without-auth]
    # Port is EXPOSED on all interfaces (no 127.0.0.1 prefix) so the rPipes
    # connector — which runs in a SEPARATE docker stack — can reach it via
    # host.docker.internal:8087. Each repo stays its own stack (per Nathan).
    ports: ["${INFLUX_PORT:-8087}:8181"]   # host 8087 -> container 8181 (8086 is the rhobot stack's own Influx)
    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: rhobot
      INFLUXDB3_OBJECT_STORE: file
      INFLUXDB3_DB_DIR: /var/lib/influxdb3
    volumes:
      - influx-data:/var/lib/influxdb3
    networks: [rtruth-net]

  telegraf:
    image: telegraf:1.39.0
    depends_on: [mosquitto, influxdb]
    volumes:
      - ./configs/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    networks: [rtruth-net]

  grafana:
    image: grafana/grafana:13.0.2
    depends_on: [influxdb]
    ports: ["127.0.0.1:${GRAFANA_PORT:-3003}:3000"]
    environment:
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks: [rtruth-net]

volumes:
  influx-data:
  mosquitto-data:
  grafana-data:

networks:
  rtruth-net:
  # Owned by the rhobot docker stack; marked external so we attach to the
  # existing network instead of creating our own. Lets the testharness app
  # (also on this net) reach the broker as tcp://rtruth-mosquitto:1883.
  rhobot-shared:
    external: true
    name: docker_rhobot-shared
