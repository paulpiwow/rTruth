# rTruth local telemetry stack:  MQTT -> Telegraf -> InfluxDB 3 -> Grafana.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#
# See README.md for ports, credentials and how data flows.

services:

  mosquitto:
    image: eclipse-mosquitto:2.0.22
    # Bind to 127.0.0.1 (IPv4) only. Docker Desktop on Windows advertises an
    # IPv6 loopback binding ([::]) but resets connections through it, and the
    # browser resolves `localhost` to ::1 first — so `localhost:<port>` fails
    # with ERR_CONNECTION_RESET. Pinning to 127.0.0.1 makes `localhost` work.
    ports: ["127.0.0.1:${MQTT_PORT:-1883}:1883"]
    volumes:
      - ./configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks: [rtruth-net]

  influxdb:
    image: influxdb:2.7
    # v2 enforces auth. On first boot it runs `setup` from the env vars below,
    # creating the org, bucket, and an admin token (= INFLUX_TOKEN). That token
    # is a shared dev credential the services use — NOT a per-user login.
    # Setup only runs on an empty volume: `docker compose down -v` to re-init.
    ports: ["127.0.0.1:${INFLUX_PORT:-8087}:8086"]   # host 8087 -> container 8086 (v2's native port; host stays 8087 to avoid the rhobot stack's Influx on 8086); 127.0.0.1 avoids the broken IPv6 loopback
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345          # >=8 chars; only for the optional InfluxDB web UI on :8087
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-rhobot}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-raw_bucket}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influx-data:/var/lib/influxdb2
    networks: [rtruth-net]

  telegraf:
    image: telegraf:1.39.0
    depends_on: [mosquitto, influxdb]
    volumes:
      - ./configs/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    networks: [rtruth-net]

  grafana:
    image: grafana/grafana:13.0.2
    depends_on: [influxdb]
    ports: ["127.0.0.1:${GRAFANA_PORT:-3003}:3000"]
    environment:
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks: [rtruth-net]

volumes:
  influx-data:
  mosquitto-data:
  grafana-data:

networks:
  rtruth-net:
